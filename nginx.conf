server {
    listen 80;
    root /var/www/html;

    # Redireciona raiz para o frontend
    location = / {
        return 301 /frontend/batalha.html;
    }

    # Arquivos estáticos do frontend
    location /frontend/ {
        try_files $uri =404;
    }

    # Bloqueia acesso direto ao backend — só web_api.php é permitido
    location /backend/ {
        deny all;
    }

    location = /backend/web_api.php {
        fastcgi_pass php:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
    }
}
